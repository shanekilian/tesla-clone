<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electric Cars, Solar & Clean Energy | Tesla</title>
  </head>
  <body>
    <section>
      <div class="site-header">
        <img src="./assets/tesla-logo.svg" alt="tesla-logo" />
        <ol>
          <li>Vehicles</li>
          <li>Energy</li>
          <li>Charging</li>
          <li>Discover</li>
          <li>Shop</li>
        </ol>
        <button>
          <img src="./assets/help-img.svg" alt="Help" height="24" width="24" />
        </button>
        <button>
          <img
            src="./assets/region-language-img.svg"
            alt="Language & Region"
            height="24"
            width="24"
          />
        </button>
        <button>
          <img
            src="./assets/account-img.svg"
            alt="Account"
            height="24"
            width="24"
          />
        </button>
      </div>
    </section>
    <section>
      <div>
        <video autoplay muted loop playsinline class="background-video">
          <source
            src="https://digitalassets.tesla.com/tesla-contents/video/upload/f_auto,q_auto:best/Homepage-Promo-Carousel-FSD-Supervised-Desktop.mp4"
            type="video/mp4"
          />
        </video>
      </div>

      <div>
        <h1>Full Self-Driving (Supervised)</h1>
        <h4>Available for $99/mo</h4>
        <button>Order Now</button>
        <button>View Inventory</button>
      </div>
    </section>

    <section>
      <div class="slider">
        <div class="product-item">
          <div class="item-media">
            <img
              src="https://digitalassets.tesla.com/tesla-contents/image/upload/f_auto,q_auto/Homepage-Card-Model-3-Desktop-US_PR_MX.jpg"
              alt="White Sport Sedan Image"
            />
          </div>
          <div class="item-info">
            <h5>Sport Sedan</h5>
            <h1>Model 3</h1>
            <a
              href="https://www.tesla.com/model3/design?id=finplat.AUTO_LEASE:OPERATIONAL_LEASE:CT_PRIVATE#overview"
              >Lease From $299/mo</a
            >
          </div>
          <div class="item-buttons">
            <button>Order Now</button>
            <button>Learn More</button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
