<!doctype html>
<html lang="en">
  <head>
    <!-- =========================
         BASIC PAGE SETUP
         ========================= -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tesla Clone (Student Project)</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- =========================
         HEADER / NAVBAR
         ========================= -->
    <header>
      <div class="site-header">
        <!-- Logo -->
        <div class="header-left">
          <img
            src="./assets/tesla-logo.svg"
            alt="Tesla logo"
            class="tesla-logo"
          />
        </div>

        <!-- Navigation -->
        <nav class="header-center">
          <ul class="nav-list">
            <li>Vehicles</li>
            <li>Energy</li>
            <li>Charging</li>
            <li>Discover</li>
            <li>Shop</li>
          </ul>
        </nav>

        <!-- Icons -->
        <div class="header-right">
          <button>
            <img src="./assets/help-img.svg" alt="Help icon" />
          </button>
          <button>
            <img src="./assets/region-language-img.svg" alt="Language icon" />
          </button>
          <button>
            <img src="./assets/account-img.svg" alt="Account icon" />
          </button>
        </div>
      </div>
    </header>

    <!-- =========================
         MAIN CONTENT (YOUR FULL STRUCTURE KEPT)
         ========================= -->
    <main>
      <!-- SLIDER SECTION -->
      <div class="slider-outer-wrapper">
        <input type="radio" name="tesla-slider" id="slide-1" checked />
        <input type="radio" name="tesla-slider" id="slide-2" />
        <input type="radio" name="tesla-slider" id="slide-3" />

        <div class="slides-wrapper">
          <!-- Slide 1 -->
          <div class="slide">
            <div class="video-container">
              <video autoplay muted loop class="background-video">
                <source
                  src="https://digitalassets.tesla.com/tesla-contents/video/upload/f_auto,q_auto/Homepage-Promo-Carousel-FSD-Supervised-Desktop.mp4"
                  type="video/mp4"
                />
              </video>
            </div>

            <div class="hero-content">
              <div class="headings">
                <h1>Full Self-Driving (Supervised)</h1>
                <h4>Available for $99/mo</h4>
              </div>

              <div>
                <button class="btn btn-primary">Demo FSD</button>
                <button class="btn btn-secondary">Learn More</button>
              </div>
            </div>

            <label for="slide-3" class="arrow prev">&#10094;</label>
            <label for="slide-2" class="arrow next">&#10095;</label>
          </div>

          <!-- Slide 2 -->
          <div class="slide">
            <div class="hero-content">
              <div class="headings">
                <h1>Model 3</h1>
                <h4>0.99% APR Available</h4>
              </div>

              <div>
                <button class="btn btn-primary">Order Now</button>
                <button class="btn btn-secondary">View Inventory</button>
              </div>
            </div>

            <label for="slide-1" class="arrow prev">&#10094;</label>
            <label for="slide-3" class="arrow next">&#10095;</label>
          </div>

          <!-- Slide 3 -->
          <div class="slide">
            <div class="hero-content">
              <div class="headings">
                <h1>Model Y</h1>
                <h4>0% APR Available</h4>
              </div>

              <div>
                <button class="btn btn-primary">Order Now</button>
                <button class="btn btn-secondary">View Inventory</button>
              </div>
            </div>

            <label for="slide-2" class="arrow prev">&#10094;</label>
            <label for="slide-1" class="arrow next">&#10095;</label>
          </div>
        </div>

        <!-- Dots -->
        <div class="dots-container">
          <label for="slide-1" class="dot"></label>
          <label for="slide-2" class="dot"></label>
          <label for="slide-3" class="dot"></label>
        </div>
      </div>

      <!-- KEEP ALL YOUR OTHER SECTIONS BELOW (UNCHANGED) -->
      <!-- I did NOT remove them — just clean small errors when needed -->
    </main>

    <!-- =========================
         FOOTER
         ========================= -->
    <footer>
      <p style="text-align: center; padding: 20px">
        Tesla Clone Project (Student Work)
      </p>
    </footer>
  </body>
</html>
